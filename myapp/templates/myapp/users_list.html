{% extends 'myapp/base.html' %}

{% block content %}

<style>

.container{
    max-width:1200px;
    margin:auto;
}

.page-title{
    color:#2563eb;
    margin-bottom:25px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.stat-card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.stat-card h1{
    font-size:40px;
    color:#2563eb;
    margin-bottom:10px;
}

.user-table{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2563eb;
    color:white;
    padding:18px;
    text-align:left;
}

td{
    padding:16px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f8fafc;
}

.user-badge{
    background:#e0f2fe;
    color:#0369a1;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

.email-badge{
    background:#f3f4f6;
    color:#374151;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
}

.date-badge{
    background:#dcfce7;
    color:#166534;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

.no-users{
    text-align:center;
    padding:40px;
    color:#64748b;
}

</style>

<div class="container">

<h1 class="page-title">
👥 Registered Users
</h1>

<div class="stats">

    <div class="stat-card">

        <h1>{{ users|length }}</h1>

        <p>Total Registered Users</p>

    </div>

</div>

<div class="user-table">

<table>

<tr>
    <th>👤 Username</th>
    <th>📧 Email</th>
    <th>📅 Joined</th>
</tr>

{% for user in users %}

<tr>

    <td>
        <span class="user-badge">
            {{ user.username }}
        </span>
    </td>

    <td>
        <span class="email-badge">
            {{ user.email }}
        </span>
    </td>

    <td>
        <span class="date-badge">
            {{ user.date_joined }}
        </span>
    </td>

</tr>

{% empty %}

<tr>

<td colspan="3">

<div class="no-users">

No users registered yet.

</div>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

{% endblock %}
