{% extends 'myapp/base.html' %}

{% block content %}

<style>

.reply-container{
    max-width:900px;
    margin:auto;
}

.reply-card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.reply-card h2{
    color:#2563eb;
    margin-bottom:20px;
}

.complaint-box{
    background:#f8fafc;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    border-left:5px solid #2563eb;
}

.complaint-box h3{
    margin-bottom:10px;
}

.complaint-box p{
    line-height:1.7;
}

textarea{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    resize:none;
    font-size:15px;
}

.send-btn{
    margin-top:15px;
    background:#16a34a;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.send-btn:hover{
    background:#15803d;
}

</style>

<div class="reply-container">

<div class="reply-card">

<h2>
💬 Reply To Complaint
</h2>

<div class="complaint-box">

<h3>
    {{ complaint.subject }}
</h3>

<p>
    {{ complaint.message }}
</p>

</div>

<form method="POST">

{% csrf_token %}

<textarea
    name="reply"
    rows="6"
    placeholder="Type your reply here..."
    required></textarea>

<button
    type="submit"
    class="send-btn">

    📤 Send Reply

</button>

</form>

</div>

</div>

{% endblock %}
