{% extends 'myapp/base.html' %}

{% block content %}

<style>

.form-box{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.form-box h2{
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

.save-btn{
    width:100%;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.save-btn:hover{
    background:#1d4ed8;
}

</style>

<div class="form-box">
<h2>✏ Edit Bus</h2>

<form method="POST">

    {% csrf_token %}

    <div class="form-group">
        <label>Bus Name</label>
        <input
            type="text"
            name="name"
            value="{{ bus.name }}"
            required>
    </div>

    <div class="form-group">
        <label>Bus Number</label>
        <input
            type="text"
            name="bus_number"
            value="{{ bus.bus_number }}"
            required>
    </div>

    <div class="form-group">
        <label>Bus Type</label>

        <select name="bus_type">

            <option value="Sleeper"
            {% if bus.bus_type == "Sleeper" %}
            selected
            {% endif %}>
            Sleeper
            </option>

            <option value="Seater"
            {% if bus.bus_type == "Seater" %}
            selected
            {% endif %}>
            Seater
            </option>

        </select>

    </div>

    <div class="form-group">
        <label>Route</label>

        <textarea
            name="route"
            rows="4"
            required>{{ bus.route }}</textarea>
    </div>

    <div class="form-group">
        <label>Departure Time</label>

        <input
            type="text"
            name="departure_time"
            value="{{ bus.departure_time }}">
    </div>

    <div class="form-group">
        <label>Arrival Time</label>

        <input
            type="text"
            name="arrival_time"
            value="{{ bus.arrival_time }}">
    </div>

    <div class="form-group">
        <label>Fare</label>

        <input
            type="number"
            name="fare"
            value="{{ bus.fare }}">
    </div>

    <div class="form-group">
        <label>Driver Name</label>

        <input
            type="text"
            name="driver_name"
            value="{{ bus.driver_name }}">
    </div>

    <div class="form-group">
        <label>Driver Phone</label>

        <input
            type="text"
            name="driver_phone"
            value="{{ bus.driver_phone }}">
    </div>

    <div class="form-group">
        <label>Current Location</label>

        <input
            type="text"
            name="current_location"
            value="{{ bus.current_location }}">
    </div>

    <div class="form-group">
        <label>Tracking Link</label>

        <input
            type="url"
            name="tracking_link"
            value="{{ bus.tracking_link }}">
    </div>

    <div class="form-group">
        <label>Status</label>

        <select name="status">

            <option value="Running">
                Running
            </option>

            <option value="Boarding">
                Boarding
            </option>

            <option value="Delayed">
                Delayed
            </option>

            <option value="Reached">
                Reached
            </option>

            <option value="Cancelled">
                Cancelled
            </option>

        </select>

    </div>

    <button
        type="submit"
        class="save-btn">

        💾 Save Changes

    </button>

</form>
</div>

{% endblock %}
