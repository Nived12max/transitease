<!DOCTYPE html>
<html>

<head>
    <title>Student Details</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1{
            text-align: center;
            color: #333;
        }

        table{
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        th{
            background-color: #111827;
            color: white;
            padding: 15px;
        }

        td{
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even){
            background-color: #f9f9f9;
        }

        tr:hover{
            background-color: #f1f1f1;
        }

        .edit-btn{
            background-color: #2563eb;
            color: white;
            padding: 7px 14px;
            text-decoration: none;
            border-radius: 5px;
        }

        .delete-btn{
            background-color: #dc2626;
            color: white;
            padding: 7px 14px;
            text-decoration: none;
            border-radius: 5px;
        }

        .edit-btn:hover{
            background-color: #1d4ed8;
        }

        .delete-btn:hover{
            background-color: #b91c1c;
        }

    </style>

</head>

<body>

    <h1>Student Details</h1>

    <table>

        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Roll No</th>
            <th>Department</th>
            <th>Actions</th>
        </tr>

        {% for s in students %}

        <tr>

            <td>{{ s.name }}</td>
            <td>{{ s.age }}</td>
            <td>{{ s.rollno }}</td>
            <td>{{ s.dept }}</td>

            <td>

                <a href="/edit/{{ s.id }}" class="edit-btn">
                    Edit
                </a>

                <a href="/delete/{{ s.id }}"
                   class="delete-btn"
                   onclick="return confirm('Are you sure you want to delete?')">

                    Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
