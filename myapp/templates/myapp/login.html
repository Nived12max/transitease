<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
        }

        .login-box{
            background:white;
            width:380px;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .input-box{
            margin-bottom:15px;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
        }

        .input-box input:focus{
            outline:none;
            border-color:#4f46e5;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#4f46e5;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#3730a3;
        }

        .error{
            color:red;
            text-align:center;
            margin-top:10px;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

        .register-link a{
            text-decoration:none;
            color:#4f46e5;
            font-weight:bold;
        }

        .register-link a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="login-box">

    <h2>Welcome Back</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>

        {% if messages %}
            {% for message in messages %}
                <p class="error">{{ message }}</p>
            {% endfor %}
        {% endif %}
    </form>

    <div class="register-link">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </div>

</div>

</body>
</html>
