{% extends 'myapp/base.html' %}

{% block content %}

<style>

.tracker-container{
    max-width:850px;
    margin:40px auto;
}

.tracker-card{
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.header h1{
    color:#2563eb;
}

.bus-badge{
    background:#dcfce7;
    color:#15803d;
    padding:8px 15px;
    border-radius:30px;
    font-weight:bold;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

.form-control{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
}

.form-control:focus{
    outline:none;
    border-color:#2563eb;
}

.preview-box{
    background:#f8fafc;
    padding:20px;
    border-radius:15px;
    margin-bottom:25px;
    border:1px solid #e5e7eb;
}

.preview-box h3{
    margin-bottom:15px;
    color:#2563eb;
}

.preview-box p{
    margin:10px 0;
    font-size:16px;
}

.update-btn{
    width:100%;
    background:#2563eb;
    color:white;
    border:none;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.update-btn:hover{
    background:#1d4ed8;
}

</style>

<div class="tracker-container">

<div class="tracker-card">

<div class="header">

<h1>📍 Live Bus Tracking</h1>

<span class="bus-badge">
    {{ bus.name }}
</span>

</div>

<div class="preview-box">


<h3>Current Tracking Status</h3>

<p>
    📍 <b>Location:</b>
    {{ bus.current_location }}
</p>

<p>
    🛑 <b>Next Stop:</b>
    {{ bus.next_stop }}
</p>

<p>
    ⏰ <b>ETA:</b>
    {{ bus.eta }}
</p>

<p>
    🟢 <b>Status:</b>
    {{ bus.status }}
</p>

</div>

<form method="POST">

{% csrf_token %}

<div class="form-group">

<label>Current Location</label>

<input
type="text"
name="current_location"
value="{{ bus.current_location }}"
class="form-control"
placeholder="Example: Mysore, Karnataka">


</div>

<div class="form-group">

<label>Next Stop</label>

<input
type="text"
name="next_stop"
value="{{ bus.next_stop }}"
class="form-control"
placeholder="Example: Iritty">


</div>

<div class="form-group">


<label>Estimated Arrival Time (ETA)</label>

<input
type="text"
name="eta"
value="{{ bus.eta }}"
class="form-control"
placeholder="Example: 2 Hours 15 Minutes">
</div>

<div class="form-group">

<label>Status</label>

<select
name="status"
class="form-control">

    <option value="Running">🟢 Running</option>
    <option value="Delayed">🟡 Delayed</option>
    <option value="Reached">🔴 Reached</option>

</select>

</div>

<button
type="submit"
class="update-btn">

🚍 Update Bus Tracking

</button>

</form>

</div>

</div>

{% endblock %}
