{% extends 'myapp/base.html' %}

{% block content %}

<style>

.tracker-card{
    background:#f8fafc;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    border:1px solid #e5e7eb;
}

.tracker-card h2{
    color:#2563eb;
    margin-bottom:15px;
}

.tracker-card p{
    margin:12px 0;
    font-size:17px;
}

.map-box{
    margin-top:20px;
}

</style>

<div style="
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
">

<h1>🚌 Live Bus Tracking</h1>

<div class="tracker-card">


<h2>{{ bus.name }}</h2>

<p>
    <b>Current Location:</b>
    📍 {{ bus.current_location }}
</p>

<p>
    <b>Next Stop:</b>
    📍 {{ bus.next_stop }}
</p>

<p>
    <b>ETA:</b>
    ⏰ {{ bus.eta }}
</p>

<p>
    <b>Status:</b>
    🟢 {{ bus.status }}
</p>

</div>

<div class="map-box">

<iframe
width="100%"
height="500"
style="border:none;border-radius:15px;"
src="https://maps.google.com/maps?q={{ bus.current_location|urlencode }}&z=13&output=embed">
</iframe>

</div>

</div>

{% endblock %}
